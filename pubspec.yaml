name: flutterapi
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  another_flushbar: ^1.12.30
  awesome_notifications: ^0.10.1
  awesome_snackbar_content: ^0.1.1
  cloud_firestore: ^5.6.8
  crypto: ^3.0.6
  crystal_navigation_bar: ^1.0.4
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  flutter_floating_bottom_bar: ^1.3.0
  flutter_screenutil: ^5.9.3
  flutter_tts: ^3.8.5
  iconly: ^1.0.1
  intl: ^0.20.2
  lottie: ^3.3.1
  provider: ^6.1.5
  smooth_page_indicator: ^1.2.1
  speech_to_text: ^7.0.0
  table_calendar: ^3.2.0

  http: any
  flutter_colorpicker: ^1.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/vocalendar_logo.png"
  # adaptive_icon_background: "#FFFFFF"
  # adaptive_icon_foreground: "assets/foreground.png"

flutter_native_splash:
  android: true
  ios: true
  web: true
  color: "#090806"
  background_image: "assets/splash.png"

  android_12:
    image: assets/android_background.png
    color: "#090806"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lotties/
    - .env
