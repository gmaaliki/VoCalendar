version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  awesome_notifications: ^0.10.1
  awesome_snackbar_content: ^0.1.1
  cloud_firestore: ^5.6.8
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  flutter:
    sdk: flutter
  flutter_screenutil: ^5.9.3
