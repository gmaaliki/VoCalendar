name: flutterapi
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  another_flushbar: ^1.12.30
  awesome_notifications: ^0.10.1
  awesome_snackbar_content: ^0.1.1
  cloud_firestore: ^5.6.8
  crypto: ^3.0.6
  crystal_navigation_bar: ^1.0.4
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  flutter:
    sdk: flutter
